<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BayesScore Results</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --surface-alt: #fafafa;
      --surface-muted: #f4f4f5;

      --ink: #18181b;
      --ink-2: #3f3f46;
      --ink-3: #71717a;
      --ink-4: #a1a1aa;
      --ink-5: #d4d4d8;

      --border: #e4e4e7;
      --border-soft: #f1f1f2;

      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-bg: #eef2ff;
      --accent-bg-soft: #f5f4ff;
      --accent-br: #c7d2fe;

      --score-excellent: #047857;
      --score-good: #059669;
      --score-average: #b45309;
      --score-poor: #b91c1c;

      --score-excellent-bg: #ecfdf5;
      --score-good-bg: #ecfdf5;
      --score-average-bg: #fffbeb;
      --score-poor-bg: #fef2f2;

      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --danger-br: #fecaca;

      --badge-bestseller-bg: #fffbeb;
      --badge-bestseller-ink: #b45309;
      --badge-choice-bg: #eef2ff;
      --badge-choice-ink: #4f46e5;
      --badge-sponsored-bg: #f4f4f5;
      --badge-sponsored-ink: #52525b;
      --badge-generic-bg: #f4f4f5;
      --badge-generic-ink: #52525b;

      --rank-1-bg: #4f46e5;
      --rank-2-bg: #18181b;
      --rank-3-bg: #71717a;
      --rank-default-bg: #f4f4f5;
      --rank-default-ink: #52525b;

      --star-color: #d97706;
      --img-bg: #f4f4f5;

      --shadow-xs: 0 1px 2px rgba(16, 24, 40, 0.04);
      --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.05);
      --shadow-md: 0 1px 2px rgba(16, 24, 40, 0.04), 0 4px 12px rgba(16, 24, 40, 0.05);
      --shadow-lg: 0 4px 16px rgba(16, 24, 40, 0.08), 0 1px 2px rgba(16, 24, 40, 0.04);
      --shadow-xl: 0 12px 32px rgba(16, 24, 40, 0.1), 0 2px 4px rgba(16, 24, 40, 0.06);
      --shadow-trusted: 0 0 0 4px rgba(79, 70, 229, 0.08), 0 4px 16px rgba(79, 70, 229, 0.12);

      --focus-ring: rgba(79, 70, 229, 0.18);
    }

    body.dark {
      --bg: #09090b;
      --surface: #18181b;
      --surface-alt: #0f0f11;
      --surface-muted: #27272a;

      --ink: #fafafa;
      --ink-2: #d4d4d8;
      --ink-3: #a1a1aa;
      --ink-4: #71717a;
      --ink-5: #3f3f46;

      --border: #27272a;
      --border-soft: #1f1f22;

      --accent: #818cf8;
      --accent-hover: #a5b4fc;
      --accent-bg: #1e1b4b;
      --accent-bg-soft: #17143d;
      --accent-br: #312e81;

      --score-excellent: #34d399;
      --score-good: #6ee7b7;
      --score-average: #fbbf24;
      --score-poor: #f87171;

      --score-excellent-bg: #052e1a;
      --score-good-bg: #052e1a;
      --score-average-bg: #3b2108;
      --score-poor-bg: #3f1212;

      --danger: #f87171;
      --danger-bg: #3f1212;
      --danger-br: #7f1d1d;

      --badge-bestseller-bg: #3b2108;
      --badge-bestseller-ink: #fbbf24;
      --badge-choice-bg: #1e1b4b;
      --badge-choice-ink: #a5b4fc;
      --badge-sponsored-bg: #27272a;
      --badge-sponsored-ink: #a1a1aa;
      --badge-generic-bg: #27272a;
      --badge-generic-ink: #a1a1aa;

      --rank-1-bg: #818cf8;
      --rank-2-bg: #fafafa;
      --rank-3-bg: #a1a1aa;
      --rank-default-bg: #27272a;
      --rank-default-ink: #a1a1aa;

      --star-color: #fbbf24;
      --img-bg: #27272a;

      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.2);
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.25);
      --shadow-md: 0 1px 2px rgba(0, 0, 0, 0.2), 0 4px 12px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.4), 0 1px 2px rgba(0, 0, 0, 0.25);
      --shadow-xl: 0 12px 32px rgba(0, 0, 0, 0.5), 0 2px 4px rgba(0, 0, 0, 0.3);
      --shadow-trusted: 0 0 0 4px rgba(129, 140, 248, 0.15), 0 4px 16px rgba(129, 140, 248, 0.2);

      --focus-ring: rgba(129, 140, 248, 0.3);
    }

    body {
      font-family:
        ui-sans-serif,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI Variable Text",
        "Segoe UI Variable",
        "Segoe UI",
        system-ui,
        Roboto,
        "Helvetica Neue",
        Arial,
        sans-serif;
      font-feature-settings: "cv11", "ss01", "ss03";
      font-optical-sizing: auto;
      background: var(--bg);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: -0.005em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      transition: background 0.24s ease, color 0.24s ease;
    }

    /* ===== SECTION PADDING ===== */
    .header, .stats-bar, .mode-tabs,
    .top5-section, .rest-section, .error-msg, .empty-state {
      padding-left: max(24px, calc((100% - 1440px) / 2));
      padding-right: max(24px, calc((100% - 1440px) / 2));
    }

    .toolbar-panel {
      margin-left: max(24px, calc((100% - 1440px) / 2));
      margin-right: max(24px, calc((100% - 1440px) / 2));
    }

    /* ===== STICKY STACK ===== */
    .header-stack {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      backdrop-filter: saturate(1.2);
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-top: 18px;
      padding-bottom: 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-soft);
      flex-wrap: wrap;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: inline-flex;
      flex-shrink: 0;
      filter: drop-shadow(0 2px 6px rgba(79, 70, 229, 0.25));
    }

    .header-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.022em;
      color: var(--ink);
      line-height: 1.1;
    }

    .header-meta p {
      font-size: 12px;
      color: var(--ink-3);
      font-weight: 400;
      letter-spacing: -0.002em;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 640px;
    }

    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    /* ===== TOP-BAR BUTTONS ===== */
    .hbtn, .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink-2);
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: -0.005em;
      box-shadow: var(--shadow-sm);
      transition: all 0.14s ease;
    }

    .hbtn:hover, .theme-toggle:hover {
      border-color: var(--ink-5);
      color: var(--ink);
      background: var(--surface-alt);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .hbtn:active, .theme-toggle:active { transform: translateY(0); }
    .hbtn svg { width: 14px; height: 14px; }

    /* ===== STATS BAR ===== */
    .stats-bar {
      padding-top: 12px;
      padding-bottom: 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stat-pill {
      display: inline-flex;
      align-items: baseline;
      gap: 5px;
      padding: 4px 11px;
      background: var(--accent-bg);
      border: 1px solid var(--accent-br);
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: -0.005em;
    }

    .stat-pill strong {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--accent-hover);
      letter-spacing: -0.015em;
    }

    body.dark .stat-pill strong { color: var(--accent); }

    .stat-pill.error {
      background: var(--danger-bg);
      border-color: var(--danger-br);
      color: var(--danger);
    }

    .stat-pill.error strong { color: var(--danger); }

    /* ===== MODE TABS ===== */
    .mode-tabs {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 2px;
      align-items: stretch;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-top: 6px;
    }

    .mode-tabs::-webkit-scrollbar { display: none; }

    .mode-btn {
      position: relative;
      padding: 11px 14px 13px;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      color: var(--ink-3);
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: -0.01em;
      transition: color 0.16s ease, background 0.16s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 8px 8px 0 0;
    }

    .mode-btn .mode-ico {
      width: 15px;
      height: 15px;
      opacity: 0.55;
      flex-shrink: 0;
      transition: opacity 0.16s ease, color 0.16s ease;
    }

    .mode-btn .mode-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ink-4);
      flex-shrink: 0;
      transition: background 0.16s ease, transform 0.18s ease;
    }

    .mode-btn::after {
      content: '';
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: -1px;
      height: 2.5px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
      transform: scaleX(0);
      transform-origin: center;
      transition: transform 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .mode-btn:hover:not(.active) {
      color: var(--ink);
      background: var(--surface-alt);
    }

    .mode-btn:hover:not(.active) .mode-ico { opacity: 0.85; }
    .mode-btn:hover:not(.active) .mode-dot { background: var(--ink-3); }

    .mode-btn.active {
      color: var(--accent);
      font-weight: 600;
      background: var(--accent-bg-soft);
    }

    .mode-btn.active .mode-ico { opacity: 1; }
    .mode-btn.active .mode-dot {
      background: var(--accent);
      transform: scale(1.15);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .mode-btn.active::after { transform: scaleX(1); }

    body.dark .mode-btn.active { color: var(--accent-hover); }
    body.dark .mode-btn.active .mode-dot {
      background: var(--accent-hover);
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.22);
    }

    /* ===== TOOLBAR PANEL ===== */
    .toolbar-panel {
      margin-top: 20px;
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-md);
      position: relative;
    }

    .toolbar-panel::before {
      content: '';
      position: absolute;
      top: 18px;
      bottom: 18px;
      left: 50%;
      width: 1px;
      background: var(--border-soft);
      transform: translateX(-0.5px);
    }

    .toolbar-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 28px;
    }

    .toolbar-col-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-4);
      margin-bottom: 10px;
    }

    .toolbar-col-label svg {
      width: 12px;
      height: 12px;
      color: var(--accent);
      opacity: 0.7;
    }

    /* ===== CONTROLS (Search + Filter Pills + Sort) ===== */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .controls-sub {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
      width: 100%;
    }

    .search-ico {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--ink-4);
      pointer-events: none;
      transition: color 0.16s ease;
    }

    .search-wrap:focus-within .search-ico { color: var(--accent); }

    .search-box {
      width: 100%;
      height: 40px;
      padding: 0 14px 0 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13.5px;
      outline: none;
      background: var(--surface);
      color: var(--ink);
      font-family: inherit;
      letter-spacing: -0.005em;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.14s, box-shadow 0.14s, background 0.24s;
    }

    .search-box:hover { border-color: var(--ink-5); }
    .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--focus-ring); }
    .search-box::placeholder { color: var(--ink-4); }

    .filter-pills {
      display: inline-flex;
      gap: 4px;
      flex-wrap: wrap;
      align-items: center;
      background: var(--surface-muted);
      border: 1px solid var(--border-soft);
      border-radius: 11px;
      padding: 3px;
    }

    .filter-btn {
      height: 34px;
      padding: 0 12px;
      border: none;
      border-radius: 8px;
      background: transparent;
      font-size: 12.5px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      color: var(--ink-3);
      letter-spacing: -0.005em;
      transition: all 0.14s ease;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .filter-btn .filter-ico {
      width: 14px;
      height: 14px;
      opacity: 0.7;
      flex-shrink: 0;
      transition: opacity 0.14s ease;
    }

    .filter-btn:hover:not(.active) {
      color: var(--ink);
    }

    .filter-btn:hover:not(.active) .filter-ico { opacity: 1; }

    .filter-btn.active {
      background: var(--surface);
      color: var(--accent);
      font-weight: 600;
      box-shadow: 0 0 0 0.5px rgba(79, 70, 229, 0.25), 0 1px 2px rgba(79, 70, 229, 0.15), 0 2px 6px rgba(79, 70, 229, 0.1);
    }

    .filter-btn.active .filter-ico { opacity: 1; color: var(--accent); }

    body.dark .filter-btn.active {
      color: var(--accent-hover);
      box-shadow: 0 0 0 0.5px rgba(129, 140, 248, 0.35), 0 1px 2px rgba(0, 0, 0, 0.4), 0 2px 6px rgba(0, 0, 0, 0.3);
    }
    body.dark .filter-btn.active .filter-ico { color: var(--accent-hover); }

    .sort-select {
      height: 40px;
      padding: 0 36px 0 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12.5px;
      font-weight: 500;
      font-family: inherit;
      background-color: var(--surface);
      color: var(--ink-2);
      cursor: pointer;
      letter-spacing: -0.005em;
      box-shadow: var(--shadow-sm);
      transition: all 0.14s ease;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 16 16' fill='none' stroke='%2371717a' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M4 6l4 4 4-4'/></svg>");
      background-repeat: no-repeat;
      background-position: right 12px center;
    }

    body.dark .sort-select {
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 16 16' fill='none' stroke='%23a1a1aa' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M4 6l4 4 4-4'/></svg>");
    }

    .sort-select:hover { border-color: var(--ink-5); color: var(--ink); }
    .sort-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--focus-ring); }

    /* ===== WORD FILTERS (Include / Exclude) ===== */
    .word-filters {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .wf-group {
      display: flex;
      align-items: stretch;
      height: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      box-shadow: var(--shadow-sm);
      transition: border-color 0.14s, box-shadow 0.14s;
      overflow: hidden;
    }

    .wf-group:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--focus-ring);
    }

    .wf-prefix {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px 0 13px;
      border-right: 1px solid var(--border-soft);
      background: var(--surface);
      color: var(--ink-2);
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex-shrink: 0;
      cursor: text;
      user-select: none;
    }

    .wf-icon-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: var(--ink-4);
      color: #fff;
      flex-shrink: 0;
      transition: background 0.16s ease, transform 0.18s ease, box-shadow 0.18s ease;
    }

    .wf-icon-box svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    .wf-group.wf-include .wf-icon-box {
      background: var(--score-excellent);
      box-shadow: 0 1px 2px rgba(4, 120, 87, 0.2);
    }

    .wf-group.wf-exclude .wf-icon-box {
      background: var(--danger);
      box-shadow: 0 1px 2px rgba(220, 38, 38, 0.2);
    }

    body.dark .wf-group.wf-include .wf-icon-box {
      background: var(--score-excellent);
      box-shadow: 0 1px 2px rgba(52, 211, 153, 0.25);
    }

    body.dark .wf-group.wf-exclude .wf-icon-box {
      background: var(--danger);
      box-shadow: 0 1px 2px rgba(248, 113, 113, 0.25);
    }

    .wf-label { line-height: 1; }

    .word-filter-input {
      flex: 1;
      min-width: 0;
      padding: 0 14px;
      border: none;
      background: transparent;
      font-size: 13px;
      font-family: inherit;
      color: var(--ink);
      outline: none;
      letter-spacing: -0.005em;
      font-weight: 500;
    }

    .word-filter-input::placeholder { color: var(--ink-4); font-weight: 400; }

    /* Active states (JS toggles classes on input) */
    .wf-group:has(.include-active) {
      border-color: var(--score-excellent);
      box-shadow: var(--shadow-sm), 0 0 0 3px rgba(4, 120, 87, 0.08);
    }

    .wf-group:has(.exclude-active) {
      border-color: var(--danger);
      box-shadow: var(--shadow-sm), 0 0 0 3px rgba(220, 38, 38, 0.08);
    }

    .wf-group:has(.include-active) .wf-icon-box,
    .wf-group:has(.exclude-active) .wf-icon-box {
      transform: scale(1.05);
    }

    body.dark .wf-group:has(.include-active) {
      box-shadow: var(--shadow-sm), 0 0 0 3px rgba(52, 211, 153, 0.12);
    }

    body.dark .wf-group:has(.exclude-active) {
      box-shadow: var(--shadow-sm), 0 0 0 3px rgba(248, 113, 113, 0.12);
    }

    /* ===== SECTION HEADINGS ===== */
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .section-title-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-ico {
      width: 18px;
      height: 18px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.024em;
      color: var(--ink);
      line-height: 1.1;
    }

    .section-sub {
      font-size: 12px;
      color: var(--ink-3);
      font-weight: 400;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.002em;
    }

    /* ===== TOP 5 SECTION ===== */
    .top5-section {
      padding-top: 24px;
      padding-bottom: 24px;
    }

    /* ===== HERO (#1) ===== */
    .hero-card {
      display: grid;
      grid-template-columns: 240px 1fr 220px;
      gap: 24px;
      align-items: stretch;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-md);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      margin-bottom: 14px;
      position: relative;
    }

    .hero-card:hover {
      transform: translateY(-2px);

    .loading {

    .empty-state {

      padding-bottom: 48px;

      font-size: 13px;
      font-weight: 500;

    .error-msg {

      <button class="mode-btn" data-mode="premium">
        <svg class="mode-ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3.5 6L8 2l4.5 4L8 14 3.5 6z"/>
          <path d="M3.5 6h9"/>
          <path d="M6 6L8 14"/>
          <path d="M10 6L8 14"/>
        </svg>
        <span>Premium Gems</span>
      </button>
      <button class="mode-btn" data-mode="quality">
        <svg class="mode-ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M8 1.5l5.5 2v4.5c0 3-2 5.5-5.5 7-3.5-1.5-5.5-4-5.5-7V3.5l5.5-2z"/>
          <path d="M5.5 8l2 2 3-4"/>
        </svg>
        <span>True Quality</span>
      </button>
    </nav>
  </div>

  <div id="error" class="error-msg" style="display:none"></div>
  <div class="stats-bar" id="stats-bar" style="display:none"></div>

  <div class="toolbar-panel" id="toolbar-panel" style="display:none">
    <div class="toolbar-grid">
      <div class="toolbar-col">
        <div class="toolbar-col-label">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="7" cy="7" r="4.5"/>
            <path d="M13.5 13.5l-3-3"/>
          </svg>
          Search &amp; filter
        </div>
        <div class="controls" id="controls">
          <div class="search-wrap">
            <svg class="search-ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="7" cy="7" r="4.5"/>
              <path d="M13.5 13.5l-3-3"/>
            </svg>
            <input type="text" class="search-box" id="search" placeholder="Search products, brands, keywords…">
          </div>
          <div class="controls-sub">
            <div class="filter-pills">
              <button class="filter-btn active" data-f="all">
                <svg class="filter-ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="2.5" y="2.5" width="4.5" height="4.5" rx="1"/>
                  <rect x="9" y="2.5" width="4.5" height="4.5" rx="1"/>
                  <rect x="2.5" y="9" width="4.5" height="4.5" rx="1"/>
                  <rect x="9" y="9" width="4.5" height="4.5" rx="1"/>
                </svg>
                <span>All</span>
              </button>
              <button class="filter-btn" data-f="top15">
                <svg class="filter-ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M5 2h6v4a3 3 0 0 1-6 0V2z"/>
                  <path d="M2.5 2.5v1.5a2 2 0 0 0 2 2"/>
                  <path d="M13.5 2.5v1.5a2 2 0 0 1-2 2"/>
                  <path d="M6.5 10l-.5 3.5h4l-.5-3.5"/>
                  <path d="M5 13.5h6"/>
                </svg>
                <span>Top 15</span>
              </button>
              <button class="filter-btn" data-f="highconf">
                <svg class="filter-ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M8 1.5l5.5 2v4.5c0 3-2 5.5-5.5 7-3.5-1.5-5.5-4-5.5-7V3.5l5.5-2z"/>
                  <path d="M5.5 8l2 2 3-4"/>
                </svg>
                <span>High Confidence</span>
              </button>
              <button class="filter-btn" data-f="deals">
                <svg class="filter-ico" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M2 2h6l6 6-6 6-6-6V2z"/>
                  <circle cx="5" cy="5" r="0.9" fill="currentColor" stroke="none"/>
                </svg>
                <span>Deals</span>
              </button>
            </div>
            <select class="sort-select" id="sort">
              <option value="score">Sort: Score</option>
              <option value="rating">Sort: Rating</option>
              <option value="reviewCount">Sort: Reviews</option>
              <option value="price-asc">Sort: Price &#8593;</option>
              <option value="price-desc">Sort: Price &#8595;</option>
              <option value="discount">Sort: Discount</option>
            </select>
          </div>
        </div>
      </div>

      <div class="toolbar-col">
        <div class="toolbar-col-label">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 4h10"/>
            <path d="M5 8h6"/>
            <path d="M7 12h2"/>
          </svg>
          Keyword rules
        </div>
        <div class="word-filters" id="word-filters">
          <div class="wf-group wf-include">
            <label class="wf-prefix" for="include-filter">
              <span class="wf-icon-box" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true">
                  <path d="M8 3.5v9"/>
                  <path d="M3.5 8h9"/>
                </svg>
              </span>
              <span class="wf-label">Include</span>
            </label>
            <input type="text" class="word-filter-input" id="include-filter" placeholder="samsung, levoit, apple">
          </div>
          <div class="wf-group wf-exclude">
            <label class="wf-prefix" for="exclude-filter">
              <span class="wf-icon-box" aria-hidden="true">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true">
                  <path d="M3.5 8h9"/>
                </svg>
              </span>
              <span class="wf-label">Exclude</span>
            </label>
            <input type="text" class="word-filter-input" id="exclude-filter" placeholder="refill, case, accessory">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading results...</p>
  </div>

  <section class="top5-section" id="top5-section" style="display:none">
    <div class="section-head">
      <div class="section-title-group">
        <svg class="section-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M10 2l2.35 4.76 5.25.76-3.8 3.71.9 5.23L10 13.98l-4.7 2.48.9-5.23-3.8-3.71 5.25-.76L10 2z"/>
        </svg>
        <h2 class="section-title">Top picks</h2>
      </div>
      <span class="section-sub" id="top5-sub">The highest-scoring products</span>
    </div>
    <div class="hero-row" id="top5-hero"></div>
    <div class="top5-gallery" id="top5-gallery"></div>
  </section>

  <section class="rest-section" id="rest-section" style="display:none">
    <div class="section-head">
      <div class="section-title-group">
        <svg class="section-ico" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="6" height="6" rx="1.5"/>
          <rect x="11" y="3" width="6" height="6" rx="1.5"/>
          <rect x="3" y="11" width="6" height="6" rx="1.5"/>
          <rect x="11" y="11" width="6" height="6" rx="1.5"/>
        </svg>
        <h2 class="section-title">All products</h2>
      </div>
      <span class="section-sub" id="rest-count"></span>
    </div>
    <div class="product-grid" id="grid"></div>
  </section>

  <div class="empty-state" id="empty-state" style="display:none">No products match these filters.</div>

  <script src="results.js"></script>
</body>
</html>
