<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BayesScore Results</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #2d3436; }
    .header { background: linear-gradient(135deg, #0984e3, #6c5ce7); color: #fff; padding: 28px 40px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .header h1 { font-size: 24px; }
    .header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
    .hbtn { padding: 8px 18px; border: 1px solid rgba(255,255,255,0.35); border-radius: 8px; background: rgba(255,255,255,0.12); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
    .hbtn:hover { background: rgba(255,255,255,0.25); }
    .stats-bar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 16px 40px; display: flex; gap: 32px; flex-wrap: wrap; }
    .stat-value { font-size: 22px; font-weight: 700; color: #0984e3; }
    .stat-label { font-size: 12px; color: #636e72; margin-top: 2px; }
    .controls { padding: 16px 40px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .search-box { flex: 1; min-width: 200px; padding: 10px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; }
    .search-box:focus { border-color: #0984e3; }
    .filter-btn { padding: 7px 16px; border: 1px solid #ddd; border-radius: 20px; background: #fff; font-size: 13px; cursor: pointer; color: #636e72; }
    .filter-btn:hover, .filter-btn.active { border-color: #0984e3; color: #0984e3; background: #ebf5fb; }
    .sort-select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 13px; background: #fff; cursor: pointer; }
    .product-grid { padding: 8px 40px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
    .card { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; transition: box-shadow 0.2s, transform 0.2s; }
    .card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.12); transform: translateY(-2px); }
    .card.top3 { outline: 2px solid #00b894; }
    .card-top { display: flex; gap: 14px; padding: 16px; }
    .card-rank { flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }
    .r1 { background: linear-gradient(135deg, #f9ca24, #f0932b); }
    .r2 { background: linear-gradient(135deg, #b2bec3, #636e72); }
    .r3 { background: linear-gradient(135deg, #e17055, #d63031); }
    .rn { background: #dfe6e9; color: #636e72; }
    .card-img { width: 72px; height: 72px; object-fit: contain; border-radius: 8px; flex-shrink: 0; background: #f8f9fa; }
    .card-info { flex: 1; min-width: 0; }
    .card-title { font-size: 13px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { display: flex; gap: 10px; margin-top: 6px; font-size: 12px; color: #636e72; flex-wrap: wrap; }
    .card-bottom { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-top: 1px solid #f0f0f0; background: #fafbfc; }
    .card-price { font-size: 18px; font-weight: 700; }
    .card-price .old { font-size: 12px; color: #b2bec3; text-decoration: line-through; font-weight: 400; margin-left: 6px; }
    .score-num { font-size: 20px; font-weight: 700; }
    .sc-e { color: #00b894; }
    .sc-g { color: #0984e3; }
    .sc-a { color: #e17055; }
    .sc-p { color: #d63031; }
    .score-conf { font-size: 11px; color: #b2bec3; }
    .green { color: #00b894; font-weight: 600; }
    .badge-tag { color: #6c5ce7; background: #dfe6e9; padding: 1px 8px; border-radius: 10px; font-size: 11px; }
    .stars { color: #f39c12; }
    .loading { text-align: center; padding: 80px; color: #636e72; }
    .spinner { width: 40px; height: 40px; border: 4px solid #dfe6e9; border-top-color: #0984e3; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { background: #ffe0e0; color: #d63031; padding: 20px 40px; font-size: 14px; }
    .mode-bar { padding: 16px 40px; background: #fff; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .mode-bar-label { font-size: 13px; font-weight: 600; color: #636e72; margin-right: 4px; }
    .mode-btn { display: flex; align-items: center; gap: 6px; padding: 8px 18px; border: 1.5px solid #dfe6e9; border-radius: 10px; background: #fff; font-size: 13px; font-weight: 600; color: #636e72; cursor: pointer; transition: all 0.2s; }
    .mode-btn:hover { border-color: #0984e3; color: #0984e3; background: #f0f8ff; }
    .mode-btn.active { border-color: #0984e3; background: linear-gradient(135deg, #0984e3, #6c5ce7); color: #fff; box-shadow: 0 2px 8px rgba(9,132,227,0.25); }
    .mode-btn .mode-icon { font-size: 16px; }
    .mode-count { font-size: 11px; opacity: 0.7; margin-left: 2px; }
    @media (max-width: 768px) { .header, .stats-bar, .mode-bar, .controls, .product-grid { padding-left: 16px; padding-right: 16px; } .product-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>BayesScore Results</h1>
      <p id="subtitle">Loading...</p>
    </div>
    <div style="display:flex;gap:10px">
      <button class="hbtn" id="btn-csv">CSV</button>
      <button class="hbtn" id="btn-json">JSON</button>
    </div>
  </div>

  <div id="error" class="error-msg" style="display:none"></div>
  <div class="stats-bar" id="stats-bar" style="display:none"></div>

  <div class="mode-bar" id="mode-bar" style="display:none">
    <span class="mode-bar-label">Ranking:</span>
    <button class="mode-btn active" data-mode="bayesian"><span class="mode-icon">📊</span> BayesScore</button>
    <button class="mode-btn" data-mode="popular"><span class="mode-icon">🔥</span> Popular</button>
    <button class="mode-btn" data-mode="value"><span class="mode-icon">💰</span> Value</button>
    <button class="mode-btn" data-mode="premium"><span class="mode-icon">💎</span> Premium Gems</button>
  </div>

  <div class="controls" id="controls" style="display:none">
    <input type="text" class="search-box" id="search" placeholder="Search products...">
    <button class="filter-btn active" data-f="all">All</button>
    <button class="filter-btn" data-f="top15">Top 15</button>
    <button class="filter-btn" data-f="highconf">High Confidence</button>
    <button class="filter-btn" data-f="deals">Deals</button>
    <select class="sort-select" id="sort">
      <option value="score">Sort: Score</option>
      <option value="rating">Sort: Rating</option>
      <option value="reviewCount">Sort: Reviews</option>
      <option value="price-asc">Sort: Price ↑</option>
      <option value="price-desc">Sort: Price ↓</option>
      <option value="discount">Sort: Discount</option>
    </select>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading results...</p>
  </div>

  <div class="product-grid" id="grid"></div>

  <script src="results.js"></script>
</body>
</html>
